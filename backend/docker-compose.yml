services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_docs_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_docs_indexer
    command: ["python", "-m", "ai_docs_assistant.entrypoints.workers.indexer"]
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - env/.env
    volumes:
      - ./docs:/app/docs

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_docs_api
    command: ["python", "-m", "ai_docs_assistant.entrypoints.application"]
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - env/.env
    volumes:
      - ./docs:/app/docs
      - ./logs:/app/logs
    ports:
      - "8000:8000"
