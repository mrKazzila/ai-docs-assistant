services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_docs_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: ai_docs_redis
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--appendfsync", "everysec",
        "--save", "60", "1"
      ]
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_docs_indexer
    command: ["python", "-m", "ai_docs_assistant.entrypoints.workers.indexer"]
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - env/.env
    volumes:
      - ./docs:/app/docs

  generation-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "ai_docs_assistant.entrypoints.workers.generation"]
    stdin_open: false
    tty: false
    environment:
      CREWAI_TRACING_ENABLED: "false"
      CREWAI_DISABLE_TELEMETRY: "true"
      OTEL_SDK_DISABLED: "true"
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_healthy
    env_file:
      - env/.env
    volumes:
      - ./docs:/app/docs
      - ./logs:/app/logs

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_docs_api
    command: ["python", "-m", "ai_docs_assistant.entrypoints.application"]
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - env/.env
    volumes:
      - ./docs:/app/docs
      - ./logs:/app/logs
    ports:
      - "8000:8000"
